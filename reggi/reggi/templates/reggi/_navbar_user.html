{% if request.user.is_authenticated %}
  <div class="nav-item dropdown">
    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
      {{ request.user.username }}
    </a>
    <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="{% url 'reggi.dashboard' %}">API Keys</a></li>
      <li><a class="dropdown-item" href="{% url 'reggi.profile' %}">Profile</a></li>
      <li><a class="dropdown-item" href="{% url 'reggi.change_password' %}">Change password</a></li>
      {% if usage_url %}
      <li><a class="dropdown-item" href="{{ usage_url }}">Usage</a></li>
      {% endif %}
      {% if docs_url %}
      <li><a class="dropdown-item" href="{{ docs_url }}">Docs</a></li>
      {% endif %}
      <li><hr class="dropdown-divider"></li>
      <li>
        <form method="post" action="{% url 'reggi.logout' %}">
          {% csrf_token %}
          <button type="submit" class="dropdown-item">Logout</button>
        </form>
      </li>
    </ul>
  </div>
{% else %}
  <a class="nav-link" href="{% url 'reggi.login' %}">Login</a>
  <a class="nav-link" href="{% url 'reggi.register' %}">Register</a>
{% endif %}
