{% extends "reggi/base.html" %}

{% block title %}Reset Link Sent{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h4 class="card-title mb-3">Check your email</h4>
        <p class="text-muted">
          If an account with that address exists, a password reset link has been sent.
          Check your inbox and follow the link to set a new password.
        </p>
        <a href="{% url 'reggi.login' %}" class="btn btn-outline-primary mt-2">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
