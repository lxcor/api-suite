{% extends "reggi/base.html" %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h4 class="card-title mb-3">Password changed</h4>
        <p class="text-muted">Your password has been set. You can now log in with your new password.</p>
        <a href="{% url 'reggi.login' %}" class="btn btn-primary mt-2">Log in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
